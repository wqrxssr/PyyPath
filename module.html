<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PyPath — Модуль</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f7fa;
            color: #1e2a3e;
            line-height: 1.5;
        }
        .app-container { display: flex; min-height: 100vh; }
        
        /* Боковая панель */
        .sidebar {
            width: 260px;
            background: #fff;
            border-right: 1px solid #e2e8f0;
            padding: 24px 20px;
            position: fixed;
            height: 100vh;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }
        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 32px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .logo i { color: #3B82F6; font-size: 1.8rem; }
        .logo span { background: linear-gradient(135deg, #3B82F6, #8b5cf6); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            margin: 4px 0;
            border-radius: 12px;
            color: #4a5568;
            cursor: pointer;
            transition: all 0.2s;
        }
        .nav-item:hover { background: #f1f5f9; }
        .nav-item.active { background: #eef2ff; color: #3B82F6; font-weight: 500; }
        .lives-panel, .energy-panel {
            margin-top: 24px;
            padding-top: 24px;
            border-top: 1px solid #e2e8f0;
        }
        .lives-panel .title, .energy-panel .title {
            font-size: 0.7rem;
            text-transform: uppercase;
            color: #94a3b8;
            margin-bottom: 12px;
        }
        .hearts { display: flex; gap: 6px; margin-bottom: 8px; }
        .hearts i { font-size: 1.2rem; }
        .hearts i.fa-heart { color: #ef4444; }
        .hearts i.far.fa-heart { color: #e2e8f0; }
        .energy-bar {
            background: #e2e8f0;
            border-radius: 10px;
            height: 8px;
            margin: 8px 0;
            overflow: hidden;
        }
        .energy-fill { background: #f59e0b; height: 100%; width: 0%; border-radius: 10px; }
        .energy-text { font-size: 0.75rem; color: #64748b; display: flex; justify-content: space-between; }
        .reset-info { font-size: 0.7rem; color: #94a3b8; margin-top: 8px; }

        /* Основной контент */
        .main-content {
            flex: 1;
            margin-left: 260px;
            padding: 32px 48px;
            max-width: calc(100% - 260px);
        }
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
            flex-wrap: wrap;
            gap: 16px;
        }
        .page-title h1 { font-size: 1.5rem; font-weight: 600; }
        .breadcrumb { font-size: 0.8rem; color: #94a3b8; margin-top: 4px; }
        .user-actions { display: flex; align-items: center; gap: 16px; }
        .score-badge {
            background: #f1f5f9;
            padding: 6px 14px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.9rem;
        }
        .score-badge i { color: #f59e0b; margin-right: 6px; }
        .avatar {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #3B82F6, #8b5cf6);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }
        .back-btn {
            background: transparent;
            border: none;
            color: #64748b;
            cursor: pointer;
            font-size: 0.9rem;
        }
        .back-btn:hover { color: #3B82F6; }

        /* Прогресс модуля */
        .module-progress {
            background: white;
            border-radius: 20px;
            padding: 24px;
            margin-bottom: 24px;
            border: 1px solid #e2e8f0;
        }
        .module-progress h2 { margin-bottom: 12px; }
        .progress-bar-bg {
            height: 8px;
            background: #e2e8f0;
            border-radius: 4px;
            margin: 12px 0;
        }
        .progress-fill {
            height: 100%;
            background: #3B82F6;
            border-radius: 4px;
            width: 0%;
        }

        /* Список уроков */
        .lessons-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 32px;
        }
        .lesson-card {
            background: white;
            border: 1px solid #e2e8f0;
            border-radius: 16px;
            padding: 16px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: 0.2s;
        }
        .lesson-card:hover { transform: translateX(5px); border-color: #3B82F6; }
        .lesson-card.locked { opacity: 0.5; cursor: not-allowed; }
        .lesson-card.locked:hover { transform: none; }
        .lesson-info h4 { font-size: 1rem; margin-bottom: 4px; }
        .lesson-status { font-size: 0.7rem; color: #94a3b8; }
        .test-btn {
            background: linear-gradient(135deg, #3B82F6, #1d4ed8);
            border: none;
            padding: 14px 28px;
            border-radius: 40px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            margin-top: 20px;
        }
        .test-btn:hover { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(59,130,246,0.3); }

        @media (max-width: 768px) {
            .sidebar { transform: translateX(-100%); position: fixed; z-index: 100; }
            .main-content { margin-left: 0; padding: 20px; max-width: 100%; }
        }
    </style>
</head>
<body>
<div class="app-container">
    <aside class="sidebar">
        <div class="logo"><i class="fab fa-python"></i><span>PyPath</span></div>
        <nav>
            <div class="nav-item" data-page="dashboard"><i class="fas fa-chalkboard-user"></i> Учебный план</div>
            <div class="nav-item" data-page="shop"><i class="fas fa-store"></i> Магазин</div>
            <div class="nav-item" data-page="profile"><i class="fas fa-user"></i> Мой профиль</div>
        </nav>
        <div class="energy-panel">
            <div class="title">⚡ Энергия</div>
            <div class="energy-bar"><div class="energy-fill" id="energyFill"></div></div>
            <div class="energy-text"><span id="energyCurrent">5</span><span>/5</span></div>
        </div>
        <div class="lives-panel">
            <div class="title">❤️ Жизни</div>
            <div class="hearts" id="heartsDisplay"></div>
        </div>
    </aside>

    <main class="main-content">
        <div class="top-bar">
            <div class="page-title">
                <h1 id="moduleTitle">Модуль A1</h1>
                <div class="breadcrumb">PyPath → <span id="moduleBreadcrumb">A1</span></div>
            </div>
            <div class="user-actions">
                <div class="score-badge"><i class="fas fa-star"></i> <span id="scoreValue">0</span></div>
                <div class="avatar" id="avatarBtn">M</div>
                <button class="back-btn" id="backBtn"><i class="fas fa-arrow-left"></i> Назад</button>
            </div>
        </div>

        <div class="module-progress">
            <h2 id="moduleName">Основы Python</h2>
            <div class="progress-bar-bg"><div class="progress-fill" id="moduleProgress"></div></div>
            <span id="progressText">0/14 уроков</span>
        </div>

        <div class="lessons-list" id="lessonsList"></div>
        <button class="test-btn" id="testBtn">📝 Пройти тест модуля</button>
    </main>
</div>

<script type="module">
    import { auth, db, doc, getDoc, updateDoc, onAuthStateChanged } from './firebase-config.js';
    import { getTheory } from './theory.js';

    const moduleNames = {
        A1: 'Основы Python', A2: 'Условный оператор', B1: 'Циклы',
        B2: 'Функции', C1: 'Структуры данных', C2: 'Продвинутые темы', C3: 'ООП и финал'
    };

    const urlParams = new URLSearchParams(window.location.search);
    const moduleId = urlParams.get('module') || 'A1';

    let currentUser = null;
    let userData = null;

    async function updateUI() {
        if (!userData) return;
        document.getElementById('scoreValue').innerText = userData.totalScore || 0;
        
        const energy = userData.energy || 5;
        document.getElementById('energyFill').style.width = (energy / 5) * 100 + '%';
        document.getElementById('energyCurrent').innerText = energy;
        
        const lives = userData.lives || 7;
        const heartsContainer = document.getElementById('heartsDisplay');
        if (heartsContainer) {
            let html = '';
            for (let i = 0; i < Math.min(lives, 7); i++) html += '<i class="fas fa-heart"></i>';
            for (let i = lives; i < 7; i++) html += '<i class="far fa-heart"></i>';
            heartsContainer.innerHTML = html;
        }
        
        document.getElementById('moduleTitle').innerHTML = `Модуль ${moduleId}`;
        document.getElementById('moduleBreadcrumb').innerText = moduleId;
        document.getElementById('moduleName').innerHTML = moduleNames[moduleId];
        
        const completed = userData.completedLessons || [];
        const completedInModule = completed.filter(l => l.startsWith(moduleId)).length;
        const percent = (completedInModule / 14) * 100;
        document.getElementById('moduleProgress').style.width = percent + '%';
        document.getElementById('progressText').innerHTML = `${completedInModule}/14 уроков`;
        
        renderLessons(completedInModule, completed);
    }
    
    function renderLessons(completedCount, completed) {
        const container = document.getElementById('lessonsList');
        if (!container) return;
        container.innerHTML = '';
        
        for (let i = 1; i <= 14; i++) {
            const lessonId = `${moduleId}_${i}`;
            const isCompleted = completed.includes(lessonId);
            const isAvailable = isCompleted || (i === completedCount + 1);
            const theory = getTheory(lessonId);
            
            const card = document.createElement('div');
            card.className = `lesson-card ${!isAvailable ? 'locked' : ''}`;
            card.innerHTML = `
                <div class="lesson-info">
                    <h4>Урок ${i}: ${theory.title || 'Новый урок'}</h4>
                    <div class="lesson-status">${isCompleted ? '✅ Пройден' : (isAvailable ? '🔓 Доступен' : '🔒 Заблокирован')}</div>
                </div>
                <i class="fas fa-chevron-right"></i>
            `;
            if (isAvailable) {
                card.onclick = () => window.location.href = `lesson.html?module=${moduleId}&lesson=${i}`;
            }
            container.appendChild(card);
        }
    }
    
    onAuthStateChanged(auth, async (user) => {
        if (!user) { window.location.href = 'index.html'; return; }
        currentUser = user;
        const userRef = doc(db, 'users', user.uid);
        const userSnap = await getDoc(userRef);
        userData = userSnap.exists() ? userSnap.data() : { totalScore: 0, completedLessons: [], modulesUnlocked: 1, energy: 5, lives: 7 };
        await updateUI();
    });
    
    document.getElementById('backBtn').onclick = () => window.location.href = 'dashboard.html';
    document.getElementById('testBtn').onclick = () => window.location.href = `test.html?module=${moduleId}`;
    document.getElementById('avatarBtn').onclick = () => window.location.href = 'profile.html';
    document.querySelectorAll('.nav-item').forEach(item => {
        item.onclick = () => {
            const page = item.dataset.page;
            if (page === 'profile') window.location.href = 'profile.html';
            if (page === 'shop') window.location.href = 'shop.html';
            if (page === 'dashboard') window.location.href = 'dashboard.html';
        };
    });
</script>
</body>
</html>
