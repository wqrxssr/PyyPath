<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PyPath — Урок</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f7fa;
            color: #1e2a3e;
            line-height: 1.5;
        }
        .app-container { display: flex; min-height: 100vh; }
        .sidebar {
            width: 260px;
            background: #fff;
            border-right: 1px solid #e2e8f0;
            padding: 24px 20px;
            position: fixed;
            height: 100vh;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }
        .logo { font-size: 1.5rem; font-weight: 700; margin-bottom: 32px; display: flex; align-items: center; gap: 8px; }
        .logo i { color: #3B82F6; font-size: 1.8rem; }
        .logo span { background: linear-gradient(135deg, #3B82F6, #8b5cf6); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            margin: 4px 0;
            border-radius: 12px;
            color: #4a5568;
            cursor: pointer;
            transition: all 0.2s;
        }
        .nav-item:hover { background: #f1f5f9; }
        .energy-panel, .lives-panel {
            margin-top: 24px;
            padding-top: 24px;
            border-top: 1px solid #e2e8f0;
        }
        .energy-panel .title, .lives-panel .title {
            font-size: 0.7rem;
            text-transform: uppercase;
            color: #94a3b8;
            margin-bottom: 12px;
            letter-spacing: 0.5px;
        }
        .hearts { display: flex; gap: 6px; margin-bottom: 8px; }
        .hearts i { font-size: 1.2rem; color: #ef4444; }
        .energy-bar {
            background: #e2e8f0;
            border-radius: 10px;
            height: 8px;
            margin: 8px 0;
            overflow: hidden;
        }
        .energy-fill { background: #f59e0b; height: 100%; width: 0%; border-radius: 10px; }
        .energy-text { font-size: 0.75rem; color: #64748b; display: flex; justify-content: space-between; }
        .main-content {
            flex: 1;
            margin-left: 260px;
            padding: 32px 48px;
            max-width: calc(100% - 260px);
        }
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
        }
        .page-title h1 { font-size: 1.2rem; font-weight: 600; }
        .user-actions { display: flex; align-items: center; gap: 16px; }
        .score-badge {
            background: #f1f5f9;
            padding: 6px 14px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.9rem;
        }
        .avatar {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #3B82F6, #8b5cf6);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }
        .back-btn {
            background: transparent;
            border: none;
            color: #64748b;
            cursor: pointer;
            font-size: 0.9rem;
        }
        .back-btn:hover { color: #3B82F6; }
        .lesson-card {
            background: white;
            border-radius: 24px;
            padding: 32px;
            border: 1px solid #e2e8f0;
        }
        .theory {
            line-height: 1.6;
            color: #334155;
        }
        .theory h4 { margin: 20px 0 10px 0; color: #0f172a; }
        .theory p { margin-bottom: 12px; }
        .theory pre {
            background: #1e293b;
            color: #e2e8f0;
            padding: 16px;
            border-radius: 12px;
            overflow-x: auto;
            margin: 16px 0;
            font-family: 'Monaco', 'Menlo', 'Courier New', monospace;
            font-size: 0.85rem;
        }
        .theory code {
            background: #e2e8f0;
            padding: 2px 6px;
            border-radius: 6px;
            font-family: monospace;
        }
        .task-area {
            margin-top: 32px;
            padding-top: 24px;
            border-top: 1px solid #e2e8f0;
        }
        .task-description {
            background: #f8fafc;
            padding: 20px;
            border-radius: 16px;
            margin-bottom: 20px;
        }
        .task-requirements {
            background: #f1f5f9;
            padding: 16px;
            border-radius: 12px;
            margin: 16px 0;
        }
        .task-hint {
            background: #fffbeb;
            border-left: 3px solid #f59e0b;
            padding: 16px;
            border-radius: 8px;
            margin: 16px 0;
            color: #92400e;
        }
        .code-editor {
            background: #1e1e2e;
            border-radius: 12px;
            overflow: hidden;
            margin: 16px 0;
            border: 1px solid #334155;
        }
        .code-editor-header {
            background: #2a2a3a;
            padding: 10px 16px;
            display: flex;
            gap: 12px;
            border-bottom: 1px solid #3a3a4a;
        }
        .code-editor-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #ff5f56;
        }
        .code-editor-dot:nth-child(2) { background: #ffbd2e; }
        .code-editor-dot:nth-child(3) { background: #27c93f; }
        .code-editor-title {
            margin-left: 12px;
            color: #a0a0b0;
            font-size: 0.75rem;
            font-family: monospace;
        }
        .code-editor textarea {
            width: 100%;
            padding: 20px;
            background: #1e1e2e;
            color: #e2e8f0;
            border: none;
            font-family: 'Monaco', 'Menlo', 'Courier New', monospace;
            font-size: 0.85rem;
            line-height: 1.5;
            resize: vertical;
            outline: none;
        }
        .checkbox-options label, .explain-options label {
            display: block;
            margin: 10px 0;
            padding: 12px;
            background: #f1f5f9;
            border-radius: 12px;
            cursor: pointer;
        }
        .btn {
            background: #3B82F6;
            border: none;
            padding: 12px 28px;
            border-radius: 40px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            margin-top: 20px;
        }
        .btn:hover { background: #2563eb; transform: translateY(-1px); }
        .message {
            margin-top: 20px;
            padding: 12px;
            border-radius: 12px;
            text-align: center;
        }
        .message.error { background: #fef2f2; color: #dc2626; border: 1px solid #fecaca; }
        .message.success { background: #f0fdf4; color: #16a34a; border: 1px solid #bbf7d0; }
        @media (max-width: 768px) {
            .sidebar { transform: translateX(-100%); position: fixed; z-index: 100; }
            .main-content { margin-left: 0; padding: 20px; max-width: 100%; }
        }
    </style>
</head>
<body>
<div class="app-container">
    <aside class="sidebar">
        <div class="logo"><i class="fab fa-python"></i><span>PyPath</span></div>
        <nav>
            <div class="nav-item" data-page="dashboard">Учебный план</div>
            <div class="nav-item" data-page="shop">Магазин</div>
            <div class="nav-item" data-page="profile">Мой профиль</div>
        </nav>
        <div class="energy-panel">
            <div class="title">ЭНЕРГИЯ</div>
            <div class="energy-bar"><div class="energy-fill" id="energyFill"></div></div>
            <div class="energy-text"><span id="energyCurrent">5</span><span>/5</span></div>
        </div>
        <div class="lives-panel">
            <div class="title">ЖИЗНИ</div>
            <div class="hearts" id="heartsDisplay"></div>
        </div>
    </aside>

    <main class="main-content">
        <div class="top-bar">
            <div class="page-title">
                <h1 id="lessonTitle">Загрузка...</h1>
            </div>
            <div class="user-actions">
                <div class="score-badge"><span id="scoreValue">0</span> очков</div>
                <div class="avatar" id="avatarBtn">M</div>
                <button class="back-btn" id="backBtn">Назад</button>
            </div>
        </div>

        <div class="lesson-card">
            <div id="theoryBlock"></div>
            <div class="task-area" id="taskArea" style="display: none;">
                <div id="taskBlock"></div>
                <button class="btn" id="checkBtn">Проверить</button>
                <div id="messageArea" class="message"></div>
            </div>
        </div>
    </main>
</div>

<script type="module">
    import { auth, db, doc, getDoc, updateDoc, onAuthStateChanged } from './firebase-config.js';
    import { getTheory } from './theory.js';
    import { getLesson } from './lessons.js';

    const urlParams = new URLSearchParams(window.location.search);
    const moduleId = urlParams.get('module');
    const lessonNum = urlParams.get('lesson');
    const lessonId = `${moduleId}_${lessonNum}`;

    let currentUser = null;
    let userData = null;
    let currentTask = null;

    async function updateUI() {
        if (!currentUser) return;
        const userRef = doc(db, 'users', currentUser.uid);
        const userSnap = await getDoc(userRef);
        userData = userSnap.data();
        if (!userData) return;
        
        document.getElementById('scoreValue').innerText = userData.totalScore || 0;
        const energy = userData.energy !== undefined ? userData.energy : 5;
        document.getElementById('energyFill').style.width = (energy / 5) * 100 + '%';
        document.getElementById('energyCurrent').innerText = energy;
        const lives = userData.lives !== undefined ? userData.lives : 7;
        const heartsContainer = document.getElementById('heartsDisplay');
        if (heartsContainer) {
            let html = '';
            for (let i = 0; i < lives; i++) html += '<i class="fas fa-heart"></i>';
            for (let i = lives; i < 7; i++) html += '<i class="far fa-heart"></i>';
            heartsContainer.innerHTML = html;
        }
    }

    function showMessage(text, type = 'error') {
        const msgDiv = document.getElementById('messageArea');
        msgDiv.innerHTML = text;
        msgDiv.className = `message ${type}`;
        setTimeout(() => { msgDiv.innerHTML = ''; msgDiv.className = 'message'; }, 3000);
    }

    async function completeLesson() {
        if (userData.energy <= 0) {
            showMessage('Недостаточно энергии. Подождите восстановления.', 'error');
            return;
        }
        if (userData.completedLessons?.includes(lessonId)) {
            showMessage('Урок уже пройден', 'success');
            setTimeout(() => window.location.href = `module.html?module=${moduleId}`, 1500);
            return;
        }
        userData.energy -= 1;
        userData.completedLessons = userData.completedLessons || [];
        userData.completedLessons.push(lessonId);
        userData.totalScore = (userData.totalScore || 0) + 10;
        userData.lives = Math.min(7, (userData.lives || 7) + 1);
        const userRef = doc(db, 'users', currentUser.uid);
        await updateDoc(userRef, userData);
        await updateUI();
        showMessage(`Урок пройден! +10 очков, +1 жизнь`, 'success');
        setTimeout(() => window.location.href = `module.html?module=${moduleId}`, 2000);
    }

    function renderTheory() {
        const theory = getTheory(lessonId);
        document.getElementById('lessonTitle').innerHTML = theory.title;
        document.getElementById('theoryBlock').innerHTML = theory.theory;
        document.getElementById('taskArea').style.display = 'block';
    }

    function renderTask() {
        currentTask = getLesson(lessonId);
        const container = document.getElementById('taskBlock');
        container.innerHTML = `
            <div class="task-description"><strong>Задание</strong><br>${currentTask.description}</div>
            <div class="task-requirements"><strong>Требования</strong><br>${currentTask.requirements.replace(/\n/g, '<br>')}</div>
            <div class="task-hint"><strong>Подсказка</strong><br>${currentTask.hint}</div>
        `;
        if (currentTask.type === 'code') {
            container.innerHTML += `
                <div class="code-editor">
                    <div class="code-editor-header">
                        <div class="code-editor-dot"></div>
                        <div class="code-editor-dot"></div>
                        <div class="code-editor-dot"></div>
                        <span class="code-editor-title">main.py</span>
                    </div>
                    <textarea id="answerInput" rows="8" placeholder="Напишите ваш код здесь..."></textarea>
                </div>
            `;
        } else if (currentTask.type === 'fill') {
            container.innerHTML += `<input type="text" id="answerInput" style="width:100%; padding:14px; border-radius:12px; border:1px solid #e2e8f0;" placeholder="Вставьте пропущенное слово">`;
        } else if (currentTask.type === 'checkbox' && currentTask.options) {
            let html = '<div class="checkbox-options">';
            currentTask.options.forEach((opt, idx) => {
                html += `<label><input type="checkbox" value="${idx}"> ${opt}</label>`;
            });
            html += '</div>';
            container.innerHTML += html;
        } else if (currentTask.type === 'explain' && currentTask.options) {
            let html = '<div class="explain-options">';
            currentTask.options.forEach((opt, idx) => {
                html += `<label><input type="radio" name="explain" value="${idx}"> ${opt}</label>`;
            });
            html += '</div>';
            container.innerHTML += html;
        }
    }

    document.getElementById('checkBtn').onclick = async () => {
        let isCorrect = false;
        if (currentTask.type === 'code') {
            const answer = document.getElementById('answerInput')?.value || '';
            isCorrect = currentTask.validator(answer);
        } else if (currentTask.type === 'fill') {
            const answer = document.getElementById('answerInput')?.value.trim() || '';
            isCorrect = answer === currentTask.correct;
        } else if (currentTask.type === 'checkbox') {
            const selected = Array.from(document.querySelectorAll('#taskBlock input:checked')).map(cb => parseInt(cb.value));
            isCorrect = selected.length === currentTask.correct.length && currentTask.correct.every(v => selected.includes(v));
        } else if (currentTask.type === 'explain') {
            const selected = document.querySelector('input[name="explain"]:checked');
            isCorrect = selected && parseInt(selected.value) === currentTask.correct;
        }
        if (isCorrect) {
            completeLesson();
        } else {
            userData.lives = Math.max(0, (userData.lives || 7) - 1);
            const userRef = doc(db, 'users', currentUser.uid);
            await updateDoc(userRef, { lives: userData.lives });
            await updateUI();
            showMessage(`Неправильно. Осталось жизней: ${userData.lives}`, 'error');
            if (userData.lives <= 0) {
                showMessage('Жизни кончились. Возвращаемся к модулю.', 'error');
                setTimeout(() => window.location.href = `module.html?module=${moduleId}`, 2000);
            }
        }
    };

    onAuthStateChanged(auth, async (user) => {
        if (!user) { window.location.href = 'index.html'; return; }
        currentUser = user;
        await updateUI();
        renderTheory();
        renderTask();
    });

    document.getElementById('backBtn').onclick = () => window.location.href = `module.html?module=${moduleId}`;
    document.getElementById('avatarBtn').onclick = () => window.location.href = 'profile.html';
    document.querySelectorAll('.nav-item').forEach(item => {
        item.onclick = () => {
            const page = item.dataset.page;
            if (page === 'dashboard') window.location.href = 'dashboard.html';
            if (page === 'shop') window.location.href = 'shop.html';
            if (page === 'profile') window.location.href = 'profile.html';
        };
    });
</script>
</body>
</html>
