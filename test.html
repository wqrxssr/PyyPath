<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PyPath — Тест модуля</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f7fa;
            color: #1e2a3e;
            line-height: 1.5;
        }
        .app-container { display: flex; min-height: 100vh; }
        .sidebar {
            width: 260px;
            background: #fff;
            border-right: 1px solid #e2e8f0;
            padding: 24px 20px;
            position: fixed;
            height: 100vh;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }
        .logo { font-size: 1.5rem; font-weight: 700; margin-bottom: 32px; display: flex; align-items: center; gap: 8px; }
        .logo i { color: #3B82F6; font-size: 1.8rem; }
        .logo span { background: linear-gradient(135deg, #3B82F6, #8b5cf6); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            margin: 4px 0;
            border-radius: 12px;
            color: #4a5568;
            cursor: pointer;
            transition: all 0.2s;
        }
        .nav-item:hover { background: #f1f5f9; }
        .energy-panel, .lives-panel {
            margin-top: 24px;
            padding-top: 24px;
            border-top: 1px solid #e2e8f0;
        }
        .energy-panel .title, .lives-panel .title {
            font-size: 0.7rem;
            text-transform: uppercase;
            color: #94a3b8;
            margin-bottom: 12px;
        }
        .hearts { display: flex; gap: 6px; margin-bottom: 8px; }
        .hearts i { font-size: 1.2rem; }
        .hearts i.fa-heart { color: #ef4444; }
        .hearts i.far.fa-heart { color: #e2e8f0; }
        .energy-bar {
            background: #e2e8f0;
            border-radius: 10px;
            height: 8px;
            margin: 8px 0;
            overflow: hidden;
        }
        .energy-fill { background: #f59e0b; height: 100%; width: 0%; border-radius: 10px; }
        .energy-text { font-size: 0.75rem; color: #64748b; display: flex; justify-content: space-between; }
        .main-content {
            flex: 1;
            margin-left: 260px;
            padding: 32px 48px;
            max-width: calc(100% - 260px);
        }
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
        }
        .page-title h1 { font-size: 1.5rem; font-weight: 600; }
        .user-actions { display: flex; align-items: center; gap: 16px; }
        .score-badge {
            background: #f1f5f9;
            padding: 6px 14px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.9rem;
        }
        .score-badge i { color: #f59e0b; margin-right: 6px; }
        .avatar {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #3B82F6, #8b5cf6);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }
        .back-btn {
            background: transparent;
            border: none;
            color: #64748b;
            cursor: pointer;
            font-size: 0.9rem;
        }
        .back-btn:hover { color: #3B82F6; }
        .test-card {
            background: white;
            border-radius: 24px;
            padding: 32px;
            border: 1px solid #e2e8f0;
        }
        .progress-bar-bg {
            height: 8px;
            background: #e2e8f0;
            border-radius: 4px;
            margin: 20px 0;
        }
        .progress-fill {
            height: 100%;
            background: #3B82F6;
            border-radius: 4px;
            width: 0%;
            transition: width 0.3s;
        }
        .question {
            padding: 20px;
            background: #f8fafc;
            border-radius: 16px;
            margin: 20px 0;
        }
        .question h3 { margin-bottom: 16px; }
        .option {
            display: block;
            margin: 12px 0;
            padding: 12px 16px;
            background: white;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.2s;
        }
        .option:hover { border-color: #3B82F6; background: #eff6ff; }
        .test-controls {
            display: flex;
            gap: 12px;
            margin-top: 24px;
        }
        .btn {
            background: #3B82F6;
            border: none;
            padding: 12px 24px;
            border-radius: 40px;
            color: white;
            font-weight: 600;
            cursor: pointer;
        }
        .btn-secondary { background: #94a3b8; }
        .result-success {
            background: #dcfce7;
            border: 1px solid #16a34a;
            border-radius: 16px;
            padding: 32px;
            text-align: center;
        }
        .result-fail {
            background: #fee2e2;
            border: 1px solid #dc2626;
            border-radius: 16px;
            padding: 32px;
            text-align: center;
        }
        @media (max-width: 768px) {
            .sidebar { transform: translateX(-100%); position: fixed; z-index: 100; }
            .main-content { margin-left: 0; padding: 20px; max-width: 100%; }
        }
    </style>
</head>
<body>
<div class="app-container">
    <aside class="sidebar">
        <div class="logo"><i class="fab fa-python"></i><span>PyPath</span></div>
        <nav>
            <div class="nav-item" data-page="dashboard"><i class="fas fa-chalkboard-user"></i> Учебный план</div>
            <div class="nav-item" data-page="shop"><i class="fas fa-store"></i> Магазин</div>
            <div class="nav-item" data-page="profile"><i class="fas fa-user"></i> Мой профиль</div>
        </nav>
        <div class="energy-panel">
            <div class="title">⚡ Энергия</div>
            <div class="energy-bar"><div class="energy-fill" id="energyFill"></div></div>
            <div class="energy-text"><span id="energyCurrent">5</span><span>/5</span></div>
        </div>
        <div class="lives-panel">
            <div class="title">❤️ Жизни</div>
            <div class="hearts" id="heartsDisplay"></div>
        </div>
    </aside>

    <main class="main-content">
        <div class="top-bar">
            <div class="page-title">
                <h1 id="testTitle">Тест модуля</h1>
            </div>
            <div class="user-actions">
                <div class="score-badge"><i class="fas fa-star"></i> <span id="scoreValue">0</span></div>
                <div class="avatar" id="avatarBtn">M</div>
                <button class="back-btn" id="backBtn"><i class="fas fa-arrow-left"></i> Назад</button>
            </div>
        </div>

        <div class="test-card">
            <div class="progress-bar-bg"><div class="progress-fill" id="testProgress"></div></div>
            <div id="questionContainer"></div>
            <div class="test-controls">
                <button class="btn btn-secondary" id="prevBtn">◀ Назад</button>
                <button class="btn" id="nextBtn">Далее ▶</button>
                <button class="btn" id="submitBtn" style="display:none;">✅ Завершить тест</button>
            </div>
            <div id="result"></div>
        </div>
    </main>
</div>

<script type="module">
    import { auth, db, doc, getDoc, updateDoc, onAuthStateChanged } from './firebase-config.js';
    import { getTestByModule, calculateScore, getPercentage } from './tests.js';

    const urlParams = new URLSearchParams(window.location.search);
    const moduleId = urlParams.get('module') || 'A1';
    const questions = getTestByModule(moduleId);
    
    let currentUser = null;
    let userData = null;
    let userAnswers = new Array(questions.length).fill(null);
    let currentIndex = 0;

    async function updateUI() {
        if (!userData) return;
        document.getElementById('scoreValue').innerText = userData.totalScore || 0;
        const energy = userData.energy || 5;
        document.getElementById('energyFill').style.width = (energy / 5) * 100 + '%';
        document.getElementById('energyCurrent').innerText = energy;
        const lives = userData.lives || 7;
        const heartsContainer = document.getElementById('heartsDisplay');
        if (heartsContainer) {
            let html = '';
            for (let i = 0; i < Math.min(lives, 7); i++) html += '<i class="fas fa-heart"></i>';
            for (let i = lives; i < 7; i++) html += '<i class="far fa-heart"></i>';
            heartsContainer.innerHTML = html;
        }
    }

    function loadQuestion(index) {
        const q = questions[index];
        if (!q) {
            console.error('Вопрос не найден:', index);
            return;
        }
        const container = document.getElementById('questionContainer');
        container.innerHTML = `
            <div class="question">
                <h3>Вопрос ${index + 1} из ${questions.length}</h3>
                <p style="margin-bottom: 20px;">${q.text}</p>
                <div class="options">
                    ${q.options.map((opt, i) => `
                        <label class="option">
                            <input type="radio" name="answer" value="${i}" ${userAnswers[index] === i ? 'checked' : ''}>
                            ${opt}
                        </label>
                    `).join('')}
                </div>
            </div>
        `;
        const progress = ((index + 1) / questions.length) * 100;
        document.getElementById('testProgress').style.width = `${progress}%`;
        document.getElementById('prevBtn').disabled = index === 0;
        
        const answeredCount = userAnswers.filter(a => a !== null).length;
        if (answeredCount === questions.length) {
            document.getElementById('nextBtn').style.display = 'none';
            document.getElementById('submitBtn').style.display = 'block';
        } else {
            document.getElementById('nextBtn').style.display = 'block';
            document.getElementById('submitBtn').style.display = 'none';
        }
    }

    function saveCurrentAnswer() {
        const selected = document.querySelector('input[name="answer"]:checked');
        if (selected) userAnswers[currentIndex] = parseInt(selected.value);
    }

    document.getElementById('nextBtn').onclick = () => {
        saveCurrentAnswer();
        if (currentIndex < questions.length - 1) {
            currentIndex++;
            loadQuestion(currentIndex);
        }
    };
    document.getElementById('prevBtn').onclick = () => {
        saveCurrentAnswer();
        if (currentIndex > 0) {
            currentIndex--;
            loadQuestion(currentIndex);
        }
    };
    document.getElementById('submitBtn').onclick = async () => {
        saveCurrentAnswer();
        const correct = calculateScore(moduleId, userAnswers);
        const percent = (correct / questions.length) * 100;
        const passed = percent >= 70;
        const resultDiv = document.getElementById('result');
        resultDiv.style.display = 'block';
        document.getElementById('questionContainer').style.display = 'none';
        document.querySelector('.test-controls').style.display = 'none';
        
        if (passed) {
            const modulesOrder = ['A1', 'A2', 'B1', 'B2', 'C1', 'C2', 'C3'];
            const currentIdx = modulesOrder.indexOf(moduleId);
            if (currentIdx + 1 >= (userData.modulesUnlocked || 1)) {
                userData.modulesUnlocked = currentIdx + 2;
                await updateDoc(doc(db, 'users', currentUser.uid), { modulesUnlocked: userData.modulesUnlocked });
            }
            userData.totalScore = (userData.totalScore || 0) + 100;
            await updateDoc(doc(db, 'users', currentUser.uid), { totalScore: userData.totalScore });
            resultDiv.innerHTML = `
                <div class="result-success">
                    <i class="fas fa-trophy" style="font-size:3rem; color:#f59e0b;"></i>
                    <h2 style="margin:16px 0;">Поздравляем!</h2>
                    <p>Вы набрали ${correct}/${questions.length} (${percent}%)</p>
                    <p>Модуль ${moduleId} пройден! +100 очков</p>
                    <button class="btn" id="continueBtn" style="margin-top:20px;">Продолжить</button>
                </div>
            `;
            document.getElementById('continueBtn').onclick = () => window.location.href = 'dashboard.html';
        } else {
            resultDiv.innerHTML = `
                <div class="result-fail">
                    <i class="fas fa-sad-tear" style="font-size:3rem;"></i>
                    <h2 style="margin:16px 0;">Нужно подтянуть знания</h2>
                    <p>Вы набрали ${correct}/${questions.length} (${percent}%)</p>
                    <p>Нужно 70% для прохождения модуля</p>
                    <button class="btn" id="retryBtn" style="margin-top:20px;">Попробовать снова</button>
                </div>
            `;
            document.getElementById('retryBtn').onclick = () => window.location.reload();
        }
    };

    onAuthStateChanged(auth, async (user) => {
        if (!user) { window.location.href = 'index.html'; return; }
        currentUser = user;
        const userRef = doc(db, 'users', user.uid);
        const userSnap = await getDoc(userRef);
        userData = userSnap.exists() ? userSnap.data() : { totalScore: 0, modulesUnlocked: 1, energy: 5, lives: 7 };
        document.getElementById('testTitle').innerHTML = `Тест модуля ${moduleId}`;
        await updateUI();
        
        // ✅ ГЛАВНОЕ: загружаем первый вопрос
        loadQuestion(0);
    });

    document.getElementById('backBtn').onclick = () => window.location.href = `module.html?module=${moduleId}`;
    document.getElementById('avatarBtn').onclick = () => window.location.href = 'profile.html';
    document.querySelectorAll('.nav-item').forEach(item => {
        item.onclick = () => {
            const page = item.dataset.page;
            if (page === 'dashboard') window.location.href = 'dashboard.html';
            if (page === 'shop') window.location.href = 'shop.html';
            if (page === 'profile') window.location.href = 'profile.html';
        };
    });
</script>
</body>
</html>
