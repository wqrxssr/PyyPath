<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PyPath — Мой профиль</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f7fa;
            color: #1e2a3e;
            line-height: 1.5;
        }
        .app-container { display: flex; min-height: 100vh; }
        .sidebar {
            width: 260px;
            background: #fff;
            border-right: 1px solid #e2e8f0;
            padding: 24px 20px;
            position: fixed;
            height: 100vh;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }
        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 32px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .logo i { color: #3B82F6; font-size: 1.8rem; }
        .logo span { background: linear-gradient(135deg, #3B82F6, #8b5cf6); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            margin: 4px 0;
            border-radius: 12px;
            color: #4a5568;
            cursor: pointer;
            transition: all 0.2s;
        }
        .nav-item:hover { background: #f1f5f9; }
        .energy-panel, .lives-panel {
            margin-top: 24px;
            padding-top: 24px;
            border-top: 1px solid #e2e8f0;
        }
        .energy-panel .title, .lives-panel .title {
            font-size: 0.7rem;
            text-transform: uppercase;
            color: #94a3b8;
            margin-bottom: 12px;
            letter-spacing: 0.5px;
        }
        .hearts { display: flex; gap: 6px; margin-bottom: 8px; }
        .hearts i { font-size: 1.2rem; color: #ef4444; }
        .energy-bar {
            background: #e2e8f0;
            border-radius: 10px;
            height: 8px;
            margin: 8px 0;
            overflow: hidden;
        }
        .energy-fill { background: #f59e0b; height: 100%; width: 0%; border-radius: 10px; }
        .energy-text { font-size: 0.75rem; color: #64748b; display: flex; justify-content: space-between; }
        .main-content {
            flex: 1;
            margin-left: 260px;
            padding: 32px 48px;
            max-width: calc(100% - 260px);
        }
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
        }
        .page-title h1 { font-size: 1.5rem; font-weight: 600; }
        .user-actions { display: flex; align-items: center; gap: 16px; }
        .score-badge {
            background: #f1f5f9;
            padding: 6px 14px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.9rem;
        }
        .avatar {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #3B82F6, #8b5cf6);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }
        .back-btn {
            background: transparent;
            border: none;
            color: #64748b;
            cursor: pointer;
            font-size: 0.9rem;
        }
        .back-btn:hover { color: #3B82F6; }
        .profile-card {
            background: white;
            border-radius: 24px;
            padding: 32px;
            border: 1px solid #e2e8f0;
            text-align: center;
        }
        .avatar-large {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, #3B82F6, #8b5cf6);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            font-size: 2.5rem;
            font-weight: bold;
            color: white;
            text-transform: uppercase;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 16px;
            margin: 32px 0;
        }
        .stat-card {
            background: #f8fafc;
            border-radius: 16px;
            padding: 20px;
            text-align: center;
        }
        .stat-card i { font-size: 1.5rem; margin-bottom: 8px; display: block; color: #3B82F6; }
        .stat-card .value { font-size: 1.5rem; font-weight: 700; margin: 8px 0; }
        .stat-card .label { font-size: 0.8rem; color: #64748b; }
        .achievements-list {
            text-align: left;
            margin: 24px 0;
        }
        .achievements-list h3 {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 16px;
            padding-bottom: 8px;
            border-bottom: 1px solid #e2e8f0;
        }
        .achievement-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #e2e8f0;
        }
        .achievement-item .name { font-weight: 500; }
        .achievement-item .status { font-size: 1.1rem; }
        .achievement-item .status.completed { color: #10b981; }
        .achievement-item .status.locked { color: #94a3b8; }
        .setting {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 0;
            border-bottom: 1px solid #e2e8f0;
        }
        .switch {
            position: relative;
            display: inline-block;
            width: 50px;
            height: 24px;
        }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #cbd5e1;
            transition: 0.3s;
            border-radius: 24px;
        }
        .slider:before {
            position: absolute;
            content: "";
            height: 18px;
            width: 18px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: 0.3s;
            border-radius: 50%;
        }
        input:checked + .slider { background-color: #3B82F6; }
        input:checked + .slider:before { transform: translateX(26px); }
        .btn {
            background: #3B82F6;
            border: none;
            padding: 12px 20px;
            border-radius: 40px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            margin-top: 16px;
            transition: 0.2s;
        }
        .btn:hover { background: #2563eb; transform: translateY(-1px); }
        .btn-danger { background: #ef4444; }
        .btn-danger:hover { background: #dc2626; }
        .btn-warning { background: #f59e0b; }
        .btn-warning:hover { background: #d97706; }
        @media (max-width: 768px) {
            .sidebar { transform: translateX(-100%); position: fixed; z-index: 100; }
            .main-content { margin-left: 0; padding: 20px; max-width: 100%; }
        }
    </style>
</head>
<body>
<div class="app-container">
    <aside class="sidebar">
        <div class="logo"><i class="fab fa-python"></i><span>PyPath</span></div>
        <nav>
            <div class="nav-item" data-page="dashboard">Учебный план</div>
            <div class="nav-item" data-page="shop">Магазин</div>
            <div class="nav-item" data-page="profile">Мой профиль</div>
        </nav>
        <div class="energy-panel">
            <div class="title">ЭНЕРГИЯ</div>
            <div class="energy-bar"><div class="energy-fill" id="energyFill"></div></div>
            <div class="energy-text"><span id="energyCurrent">5</span><span>/5</span></div>
        </div>
        <div class="lives-panel">
            <div class="title">ЖИЗНИ</div>
            <div class="hearts" id="heartsDisplay"></div>
        </div>
    </aside>

    <main class="main-content">
        <div class="top-bar">
            <div class="page-title">
                <h1>Мой профиль</h1>
            </div>
            <div class="user-actions">
                <div class="score-badge"><span id="scoreValue">0</span> очков</div>
                <div class="avatar" id="avatarBtn">M</div>
                <button class="back-btn" id="backBtn">Назад</button>
            </div>
        </div>

        <div class="profile-card">
            <div class="avatar-large" id="userAvatar">M</div>
            <h2 id="userEmail"></h2>
            <p id="rankName" style="color: #3B82F6; margin-bottom: 16px;">Бронзовый код</p>

            <div class="stats-grid">
                <div class="stat-card">
                    <i class="fas fa-star"></i>
                    <div class="value" id="totalScore">0</div>
                    <div class="label">очков</div>
                </div>
                <div class="stat-card">
                    <i class="fas fa-check-circle"></i>
                    <div class="value" id="lessonsCount">0</div>
                    <div class="label">уроков</div>
                </div>
                <div class="stat-card">
                    <i class="fas fa-fire"></i>
                    <div class="value" id="maxStreak">0</div>
                    <div class="label">макс. стрейк</div>
                </div>
                <div class="stat-card">
                    <i class="fas fa-crown"></i>
                    <div class="value" id="goldenCrowns">0</div>
                    <div class="label">корон</div>
                </div>
            </div>

            <div class="achievements-list">
                <h3>Достижения</h3>
                <div class="achievement-item">
                    <span class="name">10 уроков</span>
                    <span class="status" id="ach10">○</span>
                </div>
                <div class="achievement-item">
                    <span class="name">25 уроков</span>
                    <span class="status" id="ach25">○</span>
                </div>
                <div class="achievement-item">
                    <span class="name">50 уроков</span>
                    <span class="status" id="ach50">○</span>
                </div>
                <div class="achievement-item">
                    <span class="name">99 уроков</span>
                    <span class="status" id="ach99">○</span>
                </div>
                <div class="achievement-item">
                    <span class="name">7-дневный стрейк</span>
                    <span class="status" id="achStreak7">○</span>
                </div>
                <div class="achievement-item">
                    <span class="name">30-дневный стрейк</span>
                    <span class="status" id="achStreak30">○</span>
                </div>
                <div class="achievement-item">
                    <span class="name">Золотая корона</span>
                    <span class="status" id="achCrown">○</span>
                </div>
                <div class="achievement-item">
                    <span class="name">Мастер Python</span>
                    <span class="status" id="achMaster">○</span>
                </div>
            </div>

            <div class="setting">
                <span>Звуки</span>
                <label class="switch"><input type="checkbox" id="soundToggle"><span class="slider"></span></label>
            </div>

            <button class="btn" id="certBtn">Скачать сертификат</button>
            <button class="btn btn-danger" id="resetBtn">Сбросить прогресс</button>
            <button class="btn btn-warning" id="deleteAccountBtn">Удалить аккаунт</button>
            <button class="btn btn-danger" id="logoutBtn">Выйти</button>
        </div>
    </main>
</div>

<script type="module">
    import { auth, db, doc, getDoc, updateDoc, signOut, onAuthStateChanged, deleteDoc } from './firebase-config.js';

    let currentUser = null;
    let userData = null;

    const ranks = [
        { name: 'Бронзовый код', min: 0 },
        { name: 'Серебряный код', min: 500 },
        { name: 'Золотой код', min: 1500 },
        { name: 'Платиновый код', min: 3000 },
        { name: 'Алмазный код', min: 5000 },
        { name: 'Мастер Python', min: 8000 }
    ];

    function getRank(score) {
        let current = ranks[0];
        for (let r of ranks) if (score >= r.min) current = r;
        return current;
    }

    function updateStatus(elementId, condition) {
        const el = document.getElementById(elementId);
        if (el) {
            el.innerHTML = condition ? '✓' : '○';
            el.className = `status ${condition ? 'completed' : 'locked'}`;
        }
    }

    async function updateUI() {
        if (!currentUser) return;
        const userRef = doc(db, 'users', currentUser.uid);
        const userSnap = await getDoc(userRef);
        userData = userSnap.data();
        if (!userData) return;
        
        const score = userData.totalScore || 0;
        const completed = userData.completedLessons?.length || 0;
        
        document.getElementById('scoreValue').innerText = score;
        document.getElementById('totalScore').innerText = score;
        document.getElementById('maxStreak').innerText = userData.maxStreak || 0;
        document.getElementById('goldenCrowns').innerText = userData.goldenCrowns?.length || 0;
        document.getElementById('lessonsCount').innerText = `${completed}/99`;
        
        const rank = getRank(score);
        document.getElementById('rankName').innerHTML = rank.name;
        
        const energy = userData.energy !== undefined ? userData.energy : 5;
        document.getElementById('energyFill').style.width = (energy / 5) * 100 + '%';
        document.getElementById('energyCurrent').innerText = energy;
        
        const lives = userData.lives !== undefined ? userData.lives : 7;
        const heartsContainer = document.getElementById('heartsDisplay');
        if (heartsContainer) {
            let html = '';
            for (let i = 0; i < lives; i++) html += '<i class="fas fa-heart"></i>';
            for (let i = lives; i < 7; i++) html += '<i class="far fa-heart"></i>';
            heartsContainer.innerHTML = html;
        }
        
        updateStatus('ach10', completed >= 10);
        updateStatus('ach25', completed >= 25);
        updateStatus('ach50', completed >= 50);
        updateStatus('ach99', completed >= 99);
        updateStatus('achStreak7', (userData.maxStreak || 0) >= 7);
        updateStatus('achStreak30', (userData.maxStreak || 0) >= 30);
        updateStatus('achCrown', (userData.goldenCrowns?.length || 0) >= 1);
        updateStatus('achMaster', score >= 8000);
        
        if (currentUser?.email) {
            const firstLetter = currentUser.email.charAt(0).toUpperCase();
            document.getElementById('userAvatar').innerHTML = firstLetter;
            document.getElementById('userEmail').innerHTML = currentUser.email;
        }
    }

    // Функция удаления аккаунта
    async function deleteAccount() {
        if (!currentUser) return;
        
        const confirmed = confirm(
            "ВНИМАНИЕ! Это действие навсегда удалит ваш аккаунт и весь прогресс.\n\n" +
            "Вы уверены, что хотите удалить аккаунт?"
        );
        if (!confirmed) return;
        
        const password = prompt("Для подтверждения удаления введите ваш пароль:");
        if (!password) {
            alert("Удаление отменено");
            return;
        }
        
        try {
            // Показываем сообщение о загрузке
            const deleteBtn = document.getElementById('deleteAccountBtn');
            const originalText = deleteBtn.textContent;
            deleteBtn.textContent = "Удаление...";
            deleteBtn.disabled = true;
            
            // 1. Переавторизуемся для подтверждения (нужно для удаления)
            const credential = firebase.auth.EmailAuthProvider.credential(currentUser.email, password);
            await currentUser.reauthenticateWithCredential(credential);
            
            // 2. Удаляем документ из Firestore
            await deleteDoc(doc(db, 'users', currentUser.uid));
            
            // 3. Удаляем пользователя из Authentication
            await currentUser.delete();
            
            alert("Аккаунт успешно удалён");
            window.location.href = 'index.html';
        } catch (error) {
            console.error("Ошибка удаления:", error);
            let errorMessage = "Не удалось удалить аккаунт.";
            if (error.code === 'auth/wrong-password') {
                errorMessage = "Неверный пароль. Удаление отменено.";
            } else if (error.code === 'auth/requires-recent-login') {
                errorMessage = "Требуется повторный вход. Пожалуйста, выйдите и зайдите снова.";
            }
            alert(errorMessage);
            
            // Восстанавливаем кнопку
            const deleteBtn = document.getElementById('deleteAccountBtn');
            deleteBtn.textContent = "Удалить аккаунт";
            deleteBtn.disabled = false;
        }
    }

    onAuthStateChanged(auth, async (user) => {
        if (!user) { window.location.href = 'index.html'; return; }
        currentUser = user;
        await updateUI();
    });

    document.getElementById('backBtn').onclick = () => window.location.href = 'dashboard.html';
    document.getElementById('avatarBtn').onclick = () => window.location.href = 'profile.html';
    document.getElementById('logoutBtn').onclick = async () => { await signOut(auth); window.location.href = 'index.html'; };
    document.getElementById('resetBtn').onclick = async () => {
        if (confirm('Сбросить весь прогресс? Это действие необратимо.')) {
            const userRef = doc(db, 'users', currentUser.uid);
            await updateDoc(userRef, { totalScore: 0, completedLessons: [], modulesUnlocked: 1, energy: 5, lives: 7, streak: 0, maxStreak: 0, goldenCrowns: [] });
            alert('Прогресс сброшен');
            window.location.reload();
        }
    };
    document.getElementById('certBtn').onclick = () => {
        if ((userData?.totalScore || 0) >= 8000) {
            alert('СЕРТИФИКАТ\n\nPyPath\n\nПоздравляем с окончанием курса Python!');
        } else {
            alert('Сертификат доступен после достижения 8000 очков');
        }
    };
    document.getElementById('soundToggle').onchange = async (e) => {
        if (userData) {
            userData.settings = userData.settings || {};
            userData.settings.soundsEnabled = e.target.checked;
            await updateDoc(doc(db, 'users', currentUser.uid), { settings: userData.settings });
        }
    };
    
    // Кнопка удаления аккаунта
    document.getElementById('deleteAccountBtn')?.addEventListener('click', deleteAccount);
    
    document.querySelectorAll('.nav-item').forEach(item => {
        item.onclick = () => {
            const page = item.dataset.page;
            if (page === 'dashboard') window.location.href = 'dashboard.html';
            if (page === 'shop') window.location.href = 'shop.html';
        };
    });
</script>
</body>
</html>
